{% extends 'blog/base.html' %}

{% block content %}
    <h2 class="mt-4">Create a New Post</h2>
    <form method="post" class="mt-4">
        {% csrf_token %}
        <div class="form-group">
            {{ form.title.label_tag }}
            {{ form.title }}
        </div>
        <div class="form-group">
            {{ form.content.label_tag }}
            {{ form.content }}
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        
    </form>
{% endblock %}
