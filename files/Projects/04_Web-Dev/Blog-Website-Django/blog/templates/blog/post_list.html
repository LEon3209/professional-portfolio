{% extends 'blog/base.html' %}

{% block content %}
    <h2 class="mt-4">Posts</h2>
    {% for post in posts %}
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">{{ post.title }}</h5>
                <p class="card-text">{{ post.content }}</p>
            </div>
        </div>
    {% endfor %}
{% endblock %}
